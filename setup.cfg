[nosetests]
verbosity=2
with-spec=1
spec-color=1
with-coverage=1
cover-erase=1
cover-package=service

[flake8]
max-line-length = 127
exclude = .git,__pycache__,venv,env
ignore = E501

[pylint]
max-line-length = 127
disable = C0114,C0115,C0116

[coverage:run]
source = service
omit = 
    service/common/status.py
    service/__init__.py

[coverage:report]
show_missing = True
