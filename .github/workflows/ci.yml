name: CI Build
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Unit Tests
        run: nosetests -v --with-spec --spec-color --with-coverage --cover-package=service
      - name: Run BDD Tests
        run: behave
